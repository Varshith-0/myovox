<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Myovox</title>
    <!--
      GitHub Pages has no server-side routing, so a direct hit to /myovox/code
      lands here. Re-encode the path into a query and bounce to index.html, which
      decodes it back into a clean URL before the router mounts. One redirect,
      invisible to the user. https://github.com/rafgraph/spa-github-pages
      pathSegmentsToKeep = 1 keeps the /myovox/ project-page base.
    -->
    <script>
      var pathSegmentsToKeep = 1
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
