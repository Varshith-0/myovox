<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Decode the path that public/404.html stashed in the query string back into
         a clean URL, before the router mounts. https://github.com/rafgraph/spa-github-pages -->
    <script>
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Myovox — an interactive explainer of how speech is decoded from the faint electrical signals of facial muscles (surface EMG), down to 18.5% word error rate."
    />
    <link rel="canonical" href="https://varshith-0.github.io/myovox/" />
